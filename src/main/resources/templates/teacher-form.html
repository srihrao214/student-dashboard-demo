<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Teacher Form</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-4">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary rounded mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">Student Dashboard</a>

      <div class="navbar-nav">
        <a class="nav-link" href="/">Dashboard</a>
        <a class="nav-link" href="/exams">Exams</a>
        <a class="nav-link active fw-bold" href="/teachers">Teachers</a>
        <a class="nav-link" href="/students">Students</a>
      </div>
    </div>
  </nav>

  <h2 th:text="${teacher.id == null ? 'Add Teacher' : 'Edit Teacher'}"></h2>

  <form th:action="@{/teachers/save}"
        th:object="${teacher}"
        method="post"
        class="mt-4">

    <input type="hidden" th:field="*{id}"/>

    <div class="mb-3">
      <label class="form-label">Teacher Name</label>
      <input type="text"
             th:field="*{name}"
             class="form-control"
             required>
    </div>

    <div class="mb-3">
      <label class="form-label">Subject</label>
      <input type="text"
             th:field="*{subject}"
             class="form-control"
             required>
    </div>

    <button type="submit" class="btn btn-primary">
      Save
    </button>

    <a href="/teachers" class="btn btn-secondary">
      Cancel
    </a>

  </form>

</div>

</body>
</html>
