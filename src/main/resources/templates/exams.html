<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Exams</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-4">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary rounded mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Student Dashboard</a>

            <div class="navbar-nav">
                <a class="nav-link" href="/">Dashboard</a>
                <a class="nav-link" href="/lectures">Lectures</a>
                <a class="nav-link active fw-bold" href="/exams">Exams</a>
                <a class="nav-link" href="/teachers">Teachers</a>
                <a class="nav-link" href="/students">Students</a>
            </div>
        </div>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Exams</h2>

        <a href="/exams/new" class="btn btn-success">
            Add Exam
        </a>
    </div>

    <p class="text-muted">
        Total Exams:
        <span class="badge bg-primary"
              th:text="${#lists.size(exams)}">0</span>
    </p>

    <table class="table table-bordered table-striped table-hover">
        <thead>
        <tr>
            <th>Subject</th>
            <th>Date</th>
            <th>Result</th>
            <th>Student ID</th>
            <th>Student Name</th>
            <th class="text-center">Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="exam : ${exams}">
            <td th:text="${exam.subject}"></td>
            <td th:text="${exam.date}"></td>

            <td>
                <span th:if="${exam.result == 'PASS'}"
                      class="badge bg-success">
                    PASS
                </span>

                <span th:if="${exam.result == 'FAIL'}"
                      class="badge bg-danger">
                    FAIL
                </span>

                <span th:if="${exam.result == 'PENDING'}"
                      class="badge bg-warning text-dark">
                    PENDING
                </span>
            </td>

            <td th:text="${exam.student.id}"></td>
            <td th:text="${exam.student.name}"></td>

            <td class="text-center">
                <a th:href="@{/exams/edit/{id}(id=${exam.id})}"
                   class="btn btn-warning btn-sm me-2">
                    Edit
                </a>

                <a th:href="@{/exams/delete/{id}(id=${exam.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete this exam?')">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
