<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Student Dashboard</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="/exams">Exams</a>
            <a class="nav-link" href="/teachers">Teachers</a>
            <a class="nav-link" href="/students">Students</a>
        </div>
    </div>
</nav>
<h2 class="text-center mb-4"> Student Dashboard</h2>

<h4>Lecture Schedule (Mon–Fri)</h4>
<table class="table table-striped">
    <thead>
    <tr>
        <th>Day</th><th>Start</th><th>End</th><th>Subject</th><th>Teacher</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="lecture : ${lectures}">
        <td th:text="${lecture.dayOfWeek}"></td>
        <td th:text="${lecture.startTime}"></td>
        <td th:text="${lecture.endTime}"></td>
        <td th:text="${lecture.subject}"></td>
        <td th:text="${lecture.teacher.name}"></td>
    </tr>
    </tbody>
</table>

<h4>Exams</h4>
<table class="table table-bordered">
    <thead>
    <tr>
        <th>Subject</th><th>Date</th><th>Result</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="exam : ${exams}">
        <td th:text="${exam.subject}"></td>
        <td th:text="${exam.date}"></td>
        <td th:text="${exam.result}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
