<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Exam Form</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-4">

  <h2 th:text="${exam.id == null ? 'Add Exam' : 'Edit Exam'}"></h2>

  <form th:action="@{/exams/save}"
        th:object="${exam}"
        method="post">

    <input type="hidden" th:field="*{id}"/>

    <div class="mb-3">
      <label>Subject</label>
      <input type="text"
             th:field="*{subject}"
             class="form-control"
             required>
    </div>

    <div class="mb-3">
      <label>Date</label>
      <input type="date"
             th:field="*{date}"
             class="form-control"
             required>
    </div>

    <div class="mb-3">
      <label>Result</label>

      <select th:field="*{result}" class="form-select">
        <option value="PASS">PASS</option>
        <option value="FAIL">FAIL</option>
        <option value="PENDING">PENDING</option>
      </select>
    </div>

    <div class="mb-3">
      <label>Student</label>

      <select th:field="*{student.id}"
              class="form-select"
              required>

        <option th:each="student : ${students}"
                th:value="${student.id}"
                th:text="${student.name}">
        </option>

      </select>
    </div>

    <button type="submit" class="btn btn-primary">
      Save
    </button>

    <a href="/exams" class="btn btn-secondary">
      Cancel
    </a>

  </form>

</div>

</body>
</html>
