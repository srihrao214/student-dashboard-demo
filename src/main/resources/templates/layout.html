<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
        body {
            background-color: #f9f9f9;
        }
        .sidebar {
            height: 100vh;
            width: 230px;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #212529;
            color: white;
            padding-top: 20px;
        }
        .sidebar a {
            color: #ddd;
            text-decoration: none;
            display: block;
            padding: 10px 20px;
        }
        .sidebar a:hover,
        .sidebar a.active {
            background-color: #495057;
            color: #fff;
        }
        .main-content {
            margin-left: 240px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="sidebar">
  <h4 class="text-center text-light mb-4">📘 Dashboard</h4>
  <a th:href="@{/}" th:classappend="${page=='home'} ? 'active'">🏠 Home</a>
  <a th:href="@{/students}" th:classappend="${page=='students'} ? 'active'">👩‍🎓 Students</a>
  <a th:classappend="${page=='teachers'} ? 'active'" th:href="@{/teachers}">👨‍🏫 Teachers</a>
  <a th:href="@{/lectures}" th:classappend="${page=='lectures'} ? 'active'">📚 Lectures</a>
  <a th:href="@{/exams}" th:classappend="${page=='exams'} ? 'active'">🧾 Exams</a>
</div>

<div class="main-content">
  <div th:replace="${content}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
