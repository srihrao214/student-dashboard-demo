<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lectures</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-4">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary rounded mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Student Dashboard</a>

            <div class="navbar-nav">
                <a class="nav-link" href="/">Dashboard</a>
                <a class="nav-link active fw-bold" href="/lectures">Lectures</a>
                <a class="nav-link" href="/exams">Exams</a>
                <a class="nav-link" href="/teachers">Teachers</a>
                <a class="nav-link" href="/students">Students</a>
            </div>
        </div>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Lecture Schedule</h2>

        <a href="/lectures/new" class="btn btn-success">
            Add Lecture
        </a>
    </div>

    <p class="text-muted">
        Total Lectures:
        <span class="badge bg-primary" th:text="${#lists.size(lectures)}">0</span>
    </p>

    <table class="table table-bordered table-striped table-hover">
        <thead>
        <tr>
            <th>Day</th>
            <th>Start</th>
            <th>End</th>
            <th>Subject</th>
            <th>Teacher</th>
            <th class="text-center">Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="lecture : ${lectures}">
            <td th:text="${lecture.dayOfWeek}"></td>
            <td th:text="${lecture.startTime}"></td>
            <td th:text="${lecture.endTime}"></td>
            <td th:text="${lecture.subject}"></td>
            <td th:text="${lecture.teacher != null ? lecture.teacher.name : 'No teacher'}"></td>

            <td class="text-center">
                <a th:href="@{/lectures/edit/{id}(id=${lecture.id})}"
                   class="btn btn-warning btn-sm me-2">
                    Edit
                </a>

                <a th:href="@{/lectures/delete/{id}(id=${lecture.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete this lecture?')">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
