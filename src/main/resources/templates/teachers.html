<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Teachers</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-4">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary rounded mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">Student Dashboard</a>

      <div class="navbar-nav">
        <a class="nav-link" href="/">Dashboard</a>
        <a class="nav-link" href="/exams">Exams</a>
        <a class="nav-link active fw-bold" href="/teachers">Teachers</a>
        <a class="nav-link" href="/students">Students</a>
        <a class="nav-link" href="/lectures">Lectures</a>
      </div>
    </div>
  </nav>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Teachers</h2>

    <a href="/teachers/new" class="btn btn-success">
      Add Teacher
    </a>
  </div>

  <p class="text-muted">
    Total Teachers:
    <span class="badge bg-primary"
          th:text="${#lists.size(teachers)}"></span>
  </p>

  <table class="table table-bordered table-striped table-hover">
    <thead>
    <tr>
      <th style="width:35%">Name</th>
      <th style="width:35%">Subject</th>
      <th style="width:30%" class="text-center">Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="teacher : ${teachers}">
      <td th:text="${teacher.name}"></td>
      <td th:text="${teacher.subject}"></td>

      <td class="text-center">
        <a th:href="@{/teachers/edit/{id}(id=${teacher.id})}"
           class="btn btn-warning btn-sm me-2">
          Edit
        </a>

        <a th:href="@{/teachers/delete/{id}(id=${teacher.id})}"
           class="btn btn-danger btn-sm"
           onclick="return confirm('Delete this teacher?')">
          Delete
        </a>
      </td>
    </tr>
    </tbody>
  </table>

</div>

</body>
</html>
