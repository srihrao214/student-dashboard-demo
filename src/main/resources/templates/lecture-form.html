<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Lecture Form</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-4">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary rounded mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">Student Dashboard</a>

      <div class="navbar-nav">
        <a class="nav-link" href="/">Dashboard</a>
        <a class="nav-link active fw-bold" href="/lectures">Lectures</a>
        <a class="nav-link" href="/exams">Exams</a>
        <a class="nav-link" href="/teachers">Teachers</a>
        <a class="nav-link" href="/students">Students</a>
      </div>
    </div>
  </nav>

  <h2 th:text="${lecture.id == null ? 'Add Lecture' : 'Edit Lecture'}"></h2>

  <form th:action="@{/lectures/save}"
        th:object="${lecture}"
        method="post"
        class="mt-4">

    <input type="hidden" th:field="*{id}"/>

    <div class="mb-3">
      <label class="form-label">Day of Week</label>
      <select th:field="*{dayOfWeek}" class="form-select" required>
        <option value="">Select Day</option>
        <option value="MONDAY">Monday</option>
        <option value="TUESDAY">Tuesday</option>
        <option value="WEDNESDAY">Wednesday</option>
        <option value="THURSDAY">Thursday</option>
        <option value="FRIDAY">Friday</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Start Time</label>
      <input type="time"
             th:field="*{startTime}"
             class="form-control"
             required>
    </div>

    <div class="mb-3">
      <label class="form-label">End Time</label>
      <input type="time"
             th:field="*{endTime}"
             class="form-control"
             required>
    </div>

    <div class="mb-3">
      <label class="form-label">Subject</label>
      <input type="text"
             th:field="*{subject}"
             class="form-control"
             placeholder="Enter subject"
             required>
    </div>

    <div class="mb-3">
      <label class="form-label">Teacher</label>

      <select th:field="*{teacher}" class="form-select" required>
        <option value="">Select Teacher</option>

        <option th:each="teacher : ${teachers}"
                th:value="${teacher.id}"
                th:text="${teacher.name + ' - ' + teacher.subject}">
        </option>

      </select>
    </div>

    <button type="submit" class="btn btn-primary">
      Save
    </button>

    <a href="/lectures" class="btn btn-secondary">
      Cancel
    </a>

  </form>

</div>

</body>
</html>
